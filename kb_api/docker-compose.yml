services:
  embedding-service:
    build:
      context: ..
      dockerfile: embedding_service/Dockerfile
    profiles:
      - embedding
    ports:
      - "9100:9100"
    environment:
      KB_EMBEDDING_PROVIDER: mock
      KB_EMBEDDING_MODEL_NAME: mock-zh-384

  kb-api:
    build:
      context: ..
      dockerfile: kb_api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      KB_ROOT_DIR: /data/kb
      KB_BATCH_ID: batch_20260521
      KB_KB_ID: ai_qna_standard_v1
      KB_API_KEY: change-me
      KB_EMBEDDING_SERVICE_URL: http://embedding-service:9100
    volumes:
      - ../chunks:/data/kb/chunks:ro
      - ../vectors:/data/kb/vectors:ro
      - ../rag:/data/kb/rag:ro
      - ../selected:/data/kb/selected:ro
